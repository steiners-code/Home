services:
  api-gateway:
    build: ./backend/api-gateway
    container_name: home-api-gateway
    restart: always
    ports:
      - "3800:3000"
    env_file:
      - ./backend/api-gateway/.env
    volumes:
      - ./backend/api-gateway:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - home-network
      - global-database-network
    depends_on:
      - user-service

  user-service:
    build: ./backend/user
    container_name: home-user
    restart: always
    env_file:
      - ./backend/user/.env
    volumes:
      - ./backend/user:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - home-network
      - global-database-network
  #   depends_on:
  #     - frontend

  # frontend:
  #   build: ./frontend
  #   container_name: home-frontend
  #   restart: always
  #   volumes:
  #     - ./frontend:/usr/src/app
  #     - /usr/src/app/node_modules
  #   ports:
  #     - "80:3000"
  #   networks:
  #     - home-network
  #   env_file:
  #     - ./frontend/.env

networks:
  home-network:
    driver: bridge

  global-database-network:
    external: true

